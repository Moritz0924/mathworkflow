{
  "version": "v1",
  "enabled": true,
  "default_mode": "training_sandbox",
  "agent_executor": {
    "stage_execution": true,
    "command_template": [
      "python",
      "scripts/deepseek_agent_runner.py",
      "--prompt",
      "{prompt_path}",
      "--workspace",
      "{workspace}",
      "--run-dir",
      "{run_dir}",
      "--mode",
      "{mode}",
      "--max-iterations",
      "{max_iterations}",
      "--stage",
      "{stage}",
      "--call-id",
      "{call_id}"
    ],
    "timeout_seconds": 3600,
    "fallback": "prompt_bundle"
  },
  "training_sandbox": {
    "max_iterations": 3,
    "copy_risk_required": true,
    "protocol_retry_count": 1,
    "reuse_formal_stage_prompts": false,
    "derive_sandbox_prompts_from_formal": true,
    "sandbox_prompt_set": "training_sandbox_backup",
    "full_agent": true,
    "simulated_human_gates": true,
    "protected_input_paths": [
      "00_problem/problem_statement.md",
      "00_problem/inbox/"
    ],
    "required_outputs": [
      "reports/prompt_route_manifest.csv",
      "reports/stage_prompt_bundle.md",
      "reports/training_enhancement_points.csv",
      "reports/training_enhancement_points.md",
      "workspace/09_paper/full_draft.md",
      "workspace/11_review/simulated_human_gate_log.csv",
      "workspace/12_submission/final_submit_paper.md",
      "workspace/12_submission/final_submit_package.md"
    ],
    "protected_formal_paths": [
      "workflow_state.yaml",
      "02_latex_template/",
      "05_model/",
      "06_code/",
      "07_results/",
      "08_figures/",
      "09_paper/",
      "12_submission/",
      "14_contracts/"
    ],
    "workspace_copy": {
      "directories": [
        "scripts",
        "mcp_servers",
        "config",
        "prompts",
        "00_problem",
        "01_task_analysis",
        "02_latex_template",
        "03_data",
        "04_eda",
        "04_eda_code",
        "05_model",
        "06_code",
        "06_solution_code",
        "07_results",
        "08_figures",
        "09_paper",
        "10_ai_logs",
        "11_review",
        "12_submission",
        "14_contracts",
        "15_iteration_memory"
      ],
      "files": [
        "AGENTS.md",
        "README.md",
        "requirements.txt",
        "workflow_state.yaml",
        ".env"
      ],
      "prior_db_partial": [
        "13_prior_db/cards",
        "13_prior_db/screening/pdf_manifest.csv",
        "13_prior_db/screening/retrieval_results.csv",
        "13_prior_db/fulltext_index/prior_card_tfidf.json",
        "13_prior_db/fulltext_index/source_meta.jsonl"
      ]
    }
  },
  "formal_assist": {
    "stop_on_pending_gate": true,
    "allow_confirm_gate": false,
    "allow_stage_all": false,
    "training_feedback": {
      "enabled": true,
      "source": "latest_validated_training_sandbox",
      "bundle_dir": "15_iteration_memory/training_feedback",
      "max_items": 12,
      "require_validation_pass": true,
      "require_copy_risk_pass": true,
      "suggestion_only": true,
      "auto_apply": false,
      "requires_human_gate_before_formal_changes": true,
      "requires_contract_validation_before_formal_changes": true
    }
  },
  "benchmark": {
    "source": "prior_db",
    "top_k_fulltext": 3,
    "ngram_size": 8,
    "max_prior_overlap_ratio": 0.08,
    "max_source_chars_per_doc": 120000
  },
  "reports": {
    "full_gap_report": "reports/full_gap_report.md",
    "gap_report": "reports/gap_report.csv",
    "revision_queue": "reports/agent_revision_queue.csv",
    "copy_risk_report": "reports/copy_risk_report.csv"
  },
  "external_api": {
    "requires_explicit_consent": true
  }
}
