<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FAFAFA"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-family="SimHei, Microsoft YaHei, sans-serif" fill="#2C3E50">图3：参数敏感性热力图</text>
  <text x="400" y="70" text-anchor="middle" font-size="14" fill="#7F8C8D">占位符：各输入参数对输出得分的敏感性系数热力图，deep_blue_vermilion 方案</text>
  <!-- 示意矩阵 -->
  <rect x="150" y="100" width="100" height="40" fill="#1F77B4" opacity="0.9"/>
  <text x="200" y="125" text-anchor="middle" font-size="11" fill="white">参数A: 0.42</text>
  <rect x="260" y="100" width="100" height="40" fill="#4CAF50" opacity="0.7"/>
  <text x="310" y="125" text-anchor="middle" font-size="11" fill="black">参数B: 0.08</text>
  <rect x="370" y="100" width="100" height="40" fill="#FF7043" opacity="0.8"/>
  <text x="420" y="125" text-anchor="middle" font-size="11" fill="white">参数C: -0.29</text>
  <rect x="480" y="100" width="100" height="40" fill="#9E9E9E" opacity="0.5"/>
  <text x="530" y="125" text-anchor="middle" font-size="11" fill="black">参数D: 0.0</text>
  <rect x="150" y="160" width="100" height="40" fill="#1F77B4" opacity="0.8"/>
  <text x="200" y="185" text-anchor="middle" font-size="11" fill="white">参数E: 0.35</text>
  <rect x="260" y="160" width="100" height="40" fill="#4CAF50" opacity="0.6"/>
  <text x="310" y="185" text-anchor="middle" font-size="11" fill="black">参数F: 0.05</text>
  <rect x="370" y="160" width="100" height="40" fill="#FF7043" opacity="0.7"/>
  <text x="420" y="185" text-anchor="middle" font-size="11" fill="white">参数G: -0.18</text>
  <rect x="480" y="160" width="100" height="40" fill="#9E9E9E" opacity="0.4"/>
  <text x="530" y="185" text-anchor="middle" font-size="11" fill="black">参数H: -0.01</text>
  <!-- 图例 -->
  <rect x="150" y="400" width="20" height="20" fill="#1F77B4"/>
  <text x="180" y="415" font-size="12" fill="black">强正敏感 >0.3</text>
  <rect x="300" y="400" width="20" height="20" fill="#FF7043"/>
  <text x="330" y="415" font-size="12" fill="black">强负敏感 < -0.15</text>
  <rect x="450" y="400" width="20" height="20" fill="#4CAF50"/>
  <text x="480" y="415" font-size="12" fill="black">弱敏感 |<0.1</text>
</svg>