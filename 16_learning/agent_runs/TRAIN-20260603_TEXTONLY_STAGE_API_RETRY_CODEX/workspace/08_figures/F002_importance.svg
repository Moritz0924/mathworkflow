<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      .title { font-size: 18px; font-family: SimSun, serif; fill: #2c3e50; }
      .axis-label { font-size: 14px; font-family: SimSun, serif; fill: #34495e; }
      .bar { fill: #2ca02c; }
      .y-label { font-size: 12px; font-family: SimSun, serif; fill: #7f8c8d; }
      .grid { stroke: #ecf0f1; stroke-width: 0.5; }
    </style>
  </defs>
  <rect width="600" height="400" fill="#ffffff" />
  <text x="300" y="30" text-anchor="middle" class="title">特征重要性排序</text>
  <line x1="150" y1="350" x2="550" y2="350" stroke="#2c3e50" stroke-width="1.5" />
  <line x1="150" y1="350" x2="150" y2="50" stroke="#2c3e50" stroke-width="1.5" />
  <text x="350" y="385" text-anchor="middle" class="axis-label">重要性得分</text>
  <rect x="150" y="300" width="120" height="30" class="bar" />
  <text x="130" y="320" text-anchor="end" class="y-label">特征A</text>
  <rect x="150" y="260" width="200" height="30" class="bar" />
  <text x="130" y="280" text-anchor="end" class="y-label">特征B</text>
  <rect x="150" y="220" width="80" height="30" class="bar" />
  <text x="130" y="240" text-anchor="end" class="y-label">特征C</text>
  <rect x="150" y="180" width="160" height="30" class="bar" />
  <text x="130" y="200" text-anchor="end" class="y-label">特征D</text>
</svg>