<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      .title { font-size: 18px; font-family: SimSun, serif; fill: #2c3e50; }
      .axis-label { font-size: 14px; font-family: SimSun, serif; fill: #34495e; }
      .point { fill: #1f77b4; opacity: 0.8; }
      .grid { stroke: #ecf0f1; stroke-width: 0.5; }
    </style>
  </defs>
  <rect width="600" height="400" fill="#ffffff" />
  <text x="300" y="30" text-anchor="middle" class="title">预测值与真实值比较</text>
  <line x1="80" y1="350" x2="550" y2="350" stroke="#2c3e50" stroke-width="1.5" />
  <line x1="80" y1="350" x2="80" y2="50" stroke="#2c3e50" stroke-width="1.5" />
  <text x="315" y="385" text-anchor="middle" class="axis-label">真实值</text>
  <text x="20" y="200" text-anchor="middle" class="axis-label" transform="rotate(-90,20,200)">预测值</text>
  <circle cx="200" cy="200" r="4" class="point" />
  <circle cx="280" cy="180" r="4" class="point" />
  <circle cx="350" cy="250" r="4" class="point" />
  <circle cx="420" cy="150" r="4" class="point" />
  <circle cx="480" cy="220" r="4" class="point" />
</svg>