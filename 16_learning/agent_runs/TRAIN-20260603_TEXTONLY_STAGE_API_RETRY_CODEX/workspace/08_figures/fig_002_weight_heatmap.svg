<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FAFAFA"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-family="SimHei, Microsoft YaHei, sans-serif" fill="#2C3E50">图2：指标权重热力图</text>
  <text x="400" y="70" text-anchor="middle" font-size="14" fill="#7F8C8D">占位符：热力图展示各准则下指标权重，采用 teal_orange_diverging 配色</text>
  <!-- 示意网格 -->
  <rect x="100" y="100" width="120" height="50" fill="#00897B" opacity="0.8"/>
  <text x="160" y="130" text-anchor="middle" font-size="12" fill="white">准则A-指标1: 0.35</text>
  <rect x="230" y="100" width="120" height="50" fill="#80CBC4" opacity="0.8"/>
  <text x="290" y="130" text-anchor="middle" font-size="12" fill="black">准则A-指标2: 0.18</text>
  <rect x="360" y="100" width="120" height="50" fill="#FFB74D" opacity="0.8"/>
  <text x="420" y="130" text-anchor="middle" font-size="12" fill="black">准则B-指标3: 0.08</text>
  <rect x="490" y="100" width="120" height="50" fill="#D84315" opacity="0.8"/>
  <text x="550" y="130" text-anchor="middle" font-size="12" fill="white">准则B-指标4: 0.39</text>
  <rect x="100" y="170" width="120" height="50" fill="#4DB6AC" opacity="0.8"/>
  <text x="160" y="200" text-anchor="middle" font-size="12" fill="white">准则C-指标5: 0.22</text>
  <rect x="230" y="170" width="120" height="50" fill="#FF8A65" opacity="0.8"/>
  <text x="290" y="200" text-anchor="middle" font-size="12" fill="black">准则C-指标6: 0.28</text>
  <!-- 颜色图例 -->
  <rect x="100" y="400" width="20" height="20" fill="#D84315"/>
  <text x="130" y="415" font-size="12" fill="black">高权重 >0.3</text>
  <rect x="250" y="400" width="20" height="20" fill="#FFB74D"/>
  <text x="280" y="415" font-size="12" fill="black">中权重 0.1-0.3</text>
  <rect x="400" y="400" width="20" height="20" fill="#80CBC4"/>
  <text x="430" y="415" font-size="12" fill="black">低权重 <0.1</text>
</svg>