version: v3.2-p1
policy_name: skill_router_policy
enabled: true

purpose:
  summary: >
    Control how specialist skills are authorized, invoked, archived, validated,
    and promoted inside the math modeling workflow.
  core_principle: >
    Skills are stage-local specialists, not workflow controllers. Skill outputs
    are advisory by default and cannot directly modify workflow state, contracts,
    scripts, frozen results, or final deliverables.

# ---------------------------------------------------------------------
# 0. Authority and conflict policy
# ---------------------------------------------------------------------

authority:
  order:
    - human_final_gate
    - workflow_controller_and_stage_state
    - contract_bus_and_validation_scripts
    - codex_executor
    - nature_skills_specialist_guidance
    - prior_db_retrieval_notes
  conflict_resolution: follow_highest_authority
  operational_context_files:
    - PROJECT_CONTEXT.md
    - TASK_PACKET.md
    - DECISIONS.md
    - CHANGELOG_AI.md
  hard_constraints:
    - use_deep_sequential_mode_only
    - do_not_run_stages_in_parallel
    - do_not_skip_human_gates
    - do_not_treat_skills_as_workflow_controller
    - do_not_generate_full_paper_before_result_contracts_exist
    - do_not_write_result_analysis_without_result_contract_entries
    - do_not_cite_unregistered_figures
    - do_not_polish_by_changing_numbers_formulas_labels_references_citations_model_names_or_result_meanings
    - do_not_copy_prior_paper_text
    - do_not_allow_reviewers_to_directly_edit_deliverables
    - do_not_allow_skills_to_directly_modify_final_submission

# ---------------------------------------------------------------------
# 1. Stage identity policy
# ---------------------------------------------------------------------

stage_identity_policy:
  source_of_truth: workflow_state.yaml
  execution_mode_required: deep_sequential
  allow_parallel_skill_calls: false
  allow_cross_stage_skill_calls: false
  reject_unknown_stage: true
  reject_legacy_stage_names: true
  legacy_stage_names:
    literature:
      status: deprecated
      replacement_behavior: use_paper_draft_or_paper_full_with_nature_citation
      router_action: reject_direct_stage_call
    data:
      status: deprecated
      replacement_behavior: use_eda_with_nature_data
      router_action: reject_direct_stage_call
  ordered_stages:
    - latex_template
    - intake
    - eda
    - task_analysis
    - prior_retrieval
    - model_route
    - codegen
    - results_freeze
    - figures
    - paper_draft
    - paper_full
    - auto_review
    - revision
    - polish
    - compile
    - final_export
  stage_prompt_files:
    latex_template: prompts/stages/00_latex_template.md
    intake: prompts/stages/01_intake.md
    eda: prompts/stages/02_eda.md
    task_analysis: prompts/stages/03_task_analysis.md
    prior_retrieval: prompts/stages/04_prior_retrieval.md
    model_route: prompts/stages/05_model_route.md
    codegen: prompts/stages/06_codegen.md
    results_freeze: prompts/stages/07_results_freeze.md
    figures: prompts/stages/08_figures.md
    paper_draft: prompts/stages/09_paper_draft.md
    paper_full: prompts/stages/10_paper_full.md
    auto_review: prompts/stages/11_auto_review.md
    revision: prompts/stages/12_revision.md
    polish: prompts/stages/13_polish.md
    compile: prompts/stages/14_compile.md
    final_export: prompts/stages/15_final_export.md

# ---------------------------------------------------------------------
# 2. Router mode
# ---------------------------------------------------------------------

router_mode:
  deny_by_default: true
  skill_output_default_status: advisory
  archive_before_promotion: true
  promote_only_after_validation: true
  allow_skill_to_change_workflow_state: false
  allow_skill_to_modify_agents_md: false
  allow_skill_to_modify_scripts: false
  allow_skill_to_modify_contracts_directly: false
  allow_skill_to_modify_frozen_artifacts: false
  allow_skill_output_direct_to_final_paper: false
  allow_skill_to_bypass_human_gate: false

# ---------------------------------------------------------------------
# 3. Skill roots and installation policy
# ---------------------------------------------------------------------

skill_roots:
  project_vendor:
    path: vendor/nature-skills/skills
    required: false
    pinned_by: vendor/nature-skills/VERSION.txt
  codex_user:
    path: ~/.codex/skills
    required: false
    sync_from_vendor_only: true

installation_policy:
  copy_whole_skill_directory: true
  copy_skill_md_only: false
  pin_vendor_commit: true
  restart_codex_after_sync: true
  missing_optional_skill_action: skip_and_log
  missing_required_skill_action: block_stage
  unknown_skill_action: deny_call

# ---------------------------------------------------------------------
# 4. Permission model
# ---------------------------------------------------------------------

permission_model:
  levels:
    none:
      description: Skill cannot be used in this stage.
      can_read_allowed_inputs: false
      can_write_archive: false
      can_suggest_contract_updates: false
      can_write_allowed_stage_artifacts: false
      can_write_contracts_directly: false
      can_modify_deliverables: false
      can_modify_final_paper: false
    advisory:
      description: Skill may provide suggestions only. Output must be archived.
      can_read_allowed_inputs: true
      can_write_archive: true
      can_suggest_contract_updates: false
      can_write_allowed_stage_artifacts: false
      can_write_contracts_directly: false
      can_modify_deliverables: false
      can_modify_final_paper: false
    contract_suggest:
      description: Skill may propose contract rows or contract-bound artifacts, but cannot apply them directly.
      can_read_allowed_inputs: true
      can_write_archive: true
      can_suggest_contract_updates: true
      can_write_allowed_stage_artifacts: false
      can_write_contracts_directly: false
      can_modify_deliverables: false
      can_modify_final_paper: false
    draft_assist:
      description: Skill may help draft allowed stage artifacts, but facts must remain contract-bound.
      can_read_allowed_inputs: true
      can_write_archive: true
      can_suggest_contract_updates: true
      can_write_allowed_stage_artifacts: true
      can_write_contracts_directly: false
      can_modify_deliverables: false
      can_modify_final_paper: false
    post_final:
      description: Skill may create post-final derivative artifacts only after human final gate.
      can_read_allowed_inputs: true
      can_write_archive: true
      can_write_post_final_outputs: true
      can_suggest_contract_updates: false
      can_write_contracts_directly: false
      can_modify_deliverables: false
      can_modify_final_paper: false
  global_forbidden_actions:
    - modify_workflow_state_yaml
    - modify_AGENTS_md
    - modify_scripts_directory
    - delete_contracts_or_logs
    - change_frozen_numbers
    - change_frozen_formulas
    - change_frozen_labels
    - change_frozen_references
    - change_frozen_citations
    - change_model_names
    - change_result_meanings
    - invent_data
    - invent_results
    - invent_citations
    - invent_figures
    - invent_formulas
    - copy_prior_paper_text
    - reuse_prior_paper_captions
    - reuse_prior_paper_abstracts
    - reuse_prior_paper_conclusions
    - directly_edit_final_submission_package

# ---------------------------------------------------------------------
# 5. Skill registry
# ---------------------------------------------------------------------

skills:
  nature-academic-search:
    status: optional
    source: nature-skills
    category: literature_search
    default_permission: advisory
    mode: api_backed_when_available
    allowed_output_types:
      - search_query_plan
      - candidate_paper_list
      - search_gap_report
    forbidden_output_types:
      - fabricated_reference
      - unsupported_citation
      - final_citation_without_verification
  nature-citation:
    status: optional
    source: nature-skills
    category: citation_verification
    default_permission: contract_suggest
    mode: verified_support_only
    allowed_output_types:
      - citation_candidate
      - citation_support_grade
      - citation_gap_report
      - citation_conflict_note
    contract_targets:
      - 14_contracts/citation_contract.csv
    forbidden_output_types:
      - fake_doi
      - fake_metadata
      - unsupported_claim_citation
      - metadata_only_as_result_evidence
  nature-data:
    status: optional
    source: nature-skills
    category: data_reproducibility
    default_permission: advisory
    mode: reproducibility_statement
    allowed_output_types:
      - data_quality_note
      - reproducibility_note
      - data_limitation_note
      - data_source_risk_note
    contract_targets:
      - 14_contracts/data_contract.yaml
    forbidden_output_types:
      - invented_dataset
      - invented_column
      - invented_statistic
      - unsupported_data_claim
  nature-reader:
    status: optional
    source: nature-skills
    category: prior_reading
    default_permission: advisory
    mode: experience_card_extraction_only
    allowed_output_types:
      - prior_card
      - model_family_hint
      - figure_type_hint
      - scoring_risk_hint
      - structure_gap_hint
    forbidden_output_types:
      - copied_paragraph
      - copied_caption
      - copied_abstract
      - copied_conclusion
      - copied_table
      - historical_result_as_current_answer
  nature-figure:
    status: optional
    source: nature-skills
    category: figure_design
    default_permission: contract_suggest
    mode: contract_first_figure_design
    allowed_output_types:
      - figure_blueprint
      - caption_candidate
      - visual_quality_review
      - chart_type_recommendation
      - figure_argument_note
    contract_targets:
      - 14_contracts/figure_contract.csv
    forbidden_output_types:
      - unregistered_figure
      - figure_without_result_id
      - figure_without_claim_or_section
      - unsupported_caption
      - decorative_figure_only
  nature-writing:
    status: optional
    source: nature-skills
    category: section_writing
    default_permission: draft_assist
    mode: evidence_bound_section_draft
    allowed_output_types:
      - section_draft
      - claim_rewrite
      - paragraph_structure
      - transition_suggestion
      - coherence_note
    contract_targets:
      - 14_contracts/claim_evidence_map.csv
    forbidden_output_types:
      - claim_without_evidence
      - invented_result
      - invented_citation
      - invented_model
      - full_paper_before_contracts
      - unsupported_strong_conclusion
  nature-response:
    status: optional
    source: nature-skills
    category: review_response
    default_permission: contract_suggest
    mode: review_task_mapping_only
    allowed_output_types:
      - review_issue_triage
      - revision_task_candidate
      - reviewer_response_draft
      - closure_check_note
    contract_targets:
      - 11_review/revision_tasks.csv
      - 14_contracts/revision_tasks.csv
    forbidden_output_types:
      - direct_deliverable_edit
      - silent_issue_dismissal
      - reviewer_override_without_human_gate
  nature-polishing:
    status: optional
    source: nature-skills
    category: language_polish
    default_permission: draft_assist
    mode: fact_preserving_diff
    allowed_output_types:
      - polish_diff
      - style_risk_note
      - readability_improvement
      - sentence_level_rewrite
    contract_targets:
      - 14_contracts/polish_diff_check.csv
    forbidden_output_types:
      - changed_number
      - changed_formula
      - changed_label
      - changed_reference
      - changed_citation
      - changed_model_name
      - changed_result_meaning
      - new_unverified_claim
  nature-paper2ppt:
    status: optional
    source: nature-skills
    category: post_final_presentation
    default_permission: post_final
    mode: post_final_presentation_only
    allowed_output_types:
      - presentation_outline
      - slide_draft
      - defense_talking_points
    forbidden_output_types:
      - paper_modification
      - new_result_claim
      - new_figure_claim
      - new_citation_claim

# ---------------------------------------------------------------------
# 6. Stage routes
# ---------------------------------------------------------------------

stage_routes:
  latex_template:
    allowed_skills: []
    reason: Template generation should remain deterministic and local.
  intake:
    allowed_skills: []
    reason: User problem intake must preserve original problem meaning and attachments.
  eda:
    allowed_skills:
      - skill_id: nature-data
        permission: advisory
        required: false
        purpose: Identify data reproducibility notes, data limitations, and data source risks.
    reason: EDA may use data guidance, but statistics must come from local code and data contracts.
  task_analysis:
    allowed_skills: []
    reason: Task decomposition is controlled by workflow prompts, problem profile, and human confirmation.
  prior_retrieval:
    allowed_skills:
      - skill_id: nature-reader
        permission: advisory
        required: false
        purpose: Extract prior experience cards only, without copying text or conclusions.
    reason: Prior materials may guide model choice but must not become answer source.
  model_route:
    allowed_skills: []
    reason: Model routing should use problem profile, prior cards, assumptions, and human-confirmed model decisions.
  codegen:
    allowed_skills: []
    reason: Generated code must remain local, reproducible, and traceable.
  results_freeze:
    allowed_skills: []
    reason: Result freezing must be governed by code outputs, result contracts, and validation scripts.
  figures:
    allowed_skills:
      - skill_id: nature-figure
        permission: contract_suggest
        required: false
        purpose: Suggest figure blueprints, captions, and visual argument checks bound to result_id and claim_id.
    reason: Figure skill may improve visual argument but cannot create unsupported or unregistered figures.
  paper_draft:
    allowed_skills:
      - skill_id: nature-writing
        permission: draft_assist
        required: false
        purpose: Draft evidence-bound sections using existing claim/result/figure/formula contracts.
      - skill_id: nature-citation
        permission: contract_suggest
        required: false
        purpose: Check citation support and citation gaps for section-level claims.
      - skill_id: nature-academic-search
        permission: advisory
        required: false
        purpose: Suggest additional search queries only when citation gaps are recorded.
    reason: Section drafting may use writing and citation guidance only after core contracts exist.
  paper_full:
    allowed_skills:
      - skill_id: nature-writing
        permission: draft_assist
        required: false
        purpose: Improve cross-section coherence without adding unsupported claims.
      - skill_id: nature-citation
        permission: contract_suggest
        required: false
        purpose: Identify citation support gaps and citation conflicts.
    reason: Full paper assembly may use writing skill, but cannot invent missing evidence or references.
  auto_review:
    allowed_skills:
      - skill_id: nature-response
        permission: contract_suggest
        required: false
        purpose: Convert review comments into structured revision task candidates.
    reason: Review assistance may triage comments but cannot edit deliverables directly.
  revision:
    allowed_skills:
      - skill_id: nature-response
        permission: contract_suggest
        required: false
        purpose: Map unresolved review issues to closure checks and revision task updates.
    reason: Revision must close tasks explicitly and preserve traceability.
  polish:
    allowed_skills:
      - skill_id: nature-polishing
        permission: draft_assist
        required: false
        purpose: Produce fact-preserving polish diffs after artifact freeze.
    reason: Polish may improve language only, never facts, protected atoms, or result meaning.
  compile:
    allowed_skills: []
    reason: Compile is deterministic and should rely on local validation and LaTeX checks.
  final_export:
    allowed_skills:
      - skill_id: nature-paper2ppt
        permission: post_final
        required: false
        require_human_final_gate: true
        purpose: Produce presentation materials after final paper is human-confirmed.
    reason: Post-final skill can derive presentation artifacts but cannot modify the paper.

# ---------------------------------------------------------------------
# 7. Required input checks
# ---------------------------------------------------------------------

preflight_checks:
  global:
    - check_policy_enabled
    - check_workflow_mode_is_deep_sequential
    - check_requested_stage_exists_in_workflow_state
    - check_current_stage_matches_requested_stage
    - check_stage_prompt_file_exists
    - check_stage_unlocked_or_explicitly_authorized
    - check_skill_registered
    - check_skill_allowed_for_stage
    - check_permission_level
    - check_required_inputs_exist
    - check_required_contracts_exist
    - check_frozen_artifacts_not_mutated
    - check_human_gate_if_required
  input_status_values:
    exists: input exists and can be read
    missing_optional: optional input missing; continue with warning
    missing_required: block skill call
    stale: input exists but upstream stage is not confirmed
    frozen: input is frozen and read-only
    invalid_contract: contract exists but fails schema or required row checks

required_inputs:
  nature-academic-search:
    any_of:
      - 02_literature/search_queries.csv
      - 02_literature/literature_need_map.md
      - 09_paper/citation_insert_list.csv
      - 14_contracts/citation_contract.csv
    recommended:
      - 01_task_analysis/problem_model_profile.csv
      - 14_contracts/claim_evidence_map.csv
  nature-citation:
    all_of:
      - 14_contracts/citation_contract.csv
    recommended:
      - 14_contracts/claim_evidence_map.csv
      - 02_literature/references.bib
      - 02_literature/evidence_table.csv
  nature-data:
    any_of:
      - 03_data/data_dictionary.csv
      - 03_data/data_quality_report.md
      - 14_contracts/data_contract.yaml
    recommended:
      - 04_eda/eda_report.md
      - 07_results/result_source_map.csv
  nature-reader:
    all_of:
      - config/prior_db_policy.yaml
      - 01_task_analysis/problem_model_profile.csv
    recommended:
      - 13_sample_prior/sample_manifest.csv
      - 13_sample_prior/sample_prior_summary.md
  nature-figure:
    all_of:
      - 14_contracts/result_contract.csv
      - 14_contracts/figure_contract.csv
    recommended:
      - 08_figures/chart_blueprint.csv
      - 08_figures/figure_design_review.csv
      - 07_results/metrics_summary.csv
  nature-writing:
    all_of:
      - 14_contracts/claim_evidence_map.csv
      - 14_contracts/result_contract.csv
      - 14_contracts/figure_contract.csv
      - 14_contracts/formula_contract.csv
    recommended:
      - 14_contracts/citation_contract.csv
      - 09_paper/outline.md
      - 08_figures/figure_caption_bank.md
  nature-response:
    all_of:
      - 11_review/review_scorecard.csv
    any_of:
      - 11_review/revision_tasks.csv
      - 14_contracts/revision_tasks.csv
    recommended:
      - 11_review/problem_reviewer_comments.md
      - 11_review/model_reviewer_comments.md
      - 11_review/code_reviewer_comments.md
      - 11_review/figure_reviewer_comments.md
      - 11_review/paper_reviewer_comments.md
      - 11_review/judge_reviewer_comments.md
  nature-polishing:
    all_of:
      - 14_contracts/artifact_freeze_registry.csv
    any_of:
      - 09_paper/draft_v2.md
      - 09_paper/final_paper.md
    recommended:
      - 14_contracts/polish_diff_check.csv
      - 09_paper/polish_plan.md
      - 09_paper/polish_tasks.csv
  nature-paper2ppt:
    all_of:
      - 12_submission/final_submit_package.md
    require_human_final_gate: true
    recommended:
      - 09_paper/final_paper.md
      - 12_submission/submission_checklist.md

# ---------------------------------------------------------------------
# 8. Output archiving and promotion
# ---------------------------------------------------------------------

output_archiving:
  enabled: true
  root: 10_ai_logs/skill_outputs
  path_template: "{stage_id}/{skill_id}/{call_id}/"
  required_files_per_call:
    - input_manifest.yaml
    - raw_output.md
    - promotion_notes.md
  include_input_manifest: true
  include_policy_snapshot: true
  include_contract_snapshot_refs: true
  archive_before_promotion: true

usage_log:
  enabled: true
  path: 10_ai_logs/skill_usage_log.csv
  create_if_missing: true
  columns:
    - call_id
    - timestamp
    - stage_id
    - skill_id
    - permission_level
    - router_decision
    - required_inputs_status
    - archive_path
    - output_type
    - promotion_target
    - validation_status
    - failure_code
    - human_confirmation_required
    - notes

promotion_rules:
  default: manual_or_validator_required
  block_unknown_output_type: true
  allowed_targets:
    search_query_plan:
      target: 02_literature/search_queries.csv
      requires_validation: true
      requires_human_confirmation: false
    candidate_paper_list:
      target: 02_literature/raw_search_results.csv
      requires_validation: true
      requires_human_confirmation: false
    citation_candidate:
      target: 14_contracts/citation_contract.csv
      requires_validation: true
      requires_contract_binding:
        - claim_id_or_section_id
    citation_gap_report:
      target: 02_literature/citation_gap_report.md
      requires_validation: false
      requires_human_confirmation: false
    data_quality_note:
      target: 03_data/data_quality_report.md
      requires_validation: true
      requires_human_confirmation: false
    reproducibility_note:
      target: 14_contracts/data_contract.yaml
      requires_validation: true
      requires_human_confirmation: false
    prior_card:
      target: 13_sample_prior/
      requires_validation: true
      requires_copy_risk_check: true
      requires_human_confirmation: false
    model_family_hint:
      target: 05_model/model_route.md
      requires_validation: true
      requires_human_confirmation: true
    figure_blueprint:
      target: 08_figures/chart_blueprint.csv
      requires_validation: true
      requires_contract_binding:
        - result_id
        - figure_id
    caption_candidate:
      target: 08_figures/figure_caption_bank.md
      requires_validation: true
      requires_contract_binding:
        - figure_id
        - claim_id_or_result_id
    visual_quality_review:
      target: 08_figures/figure_design_review.csv
      requires_validation: true
      requires_contract_binding:
        - figure_id
    section_draft:
      target: 09_paper/draft_v1.md
      requires_validation: true
      requires_contract_binding:
        - claim_id
        - evidence_id_or_result_id
    claim_rewrite:
      target: 09_paper/draft_v1.md
      requires_validation: true
      requires_contract_binding:
        - claim_id
        - evidence_id_or_result_id
    coherence_note:
      target: 09_paper/anchor_consistency_check.md
      requires_validation: false
      requires_human_confirmation: false
    revision_task_candidate:
      target:
        - 11_review/revision_tasks.csv
        - 14_contracts/revision_tasks.csv
      requires_validation: true
      requires_reviewer_source: true
    closure_check_note:
      target: 15_iteration_memory/task_closure_log.md
      requires_validation: true
      requires_human_confirmation: false
    polish_diff:
      target:
        - 09_paper/draft_v2_polished.md
        - 14_contracts/polish_diff_check.csv
      requires_validation: true
      protected_atoms_must_match: true
    style_risk_note:
      target: 09_paper/ai_style_risk_check.md
      requires_validation: false
      requires_human_confirmation: false
    presentation_outline:
      target: 12_export/
      requires_human_final_gate: true
      must_not_modify_final_paper: true
    slide_draft:
      target: 12_export/
      requires_human_final_gate: true
      must_not_modify_final_paper: true

# ---------------------------------------------------------------------
# 9. Contract binding rules
# ---------------------------------------------------------------------

contract_binding_rules:
  claim_bound_writing:
    required_contracts:
      - 14_contracts/claim_evidence_map.csv
      - 14_contracts/result_contract.csv
      - 14_contracts/figure_contract.csv
      - 14_contracts/formula_contract.csv
    rule: >
      No section draft may introduce a claim unless the claim is already bound to
      evidence_id, result_id, figure_id, formula_id, or citation_id.
  result_bound_figures:
    required_contracts:
      - 14_contracts/result_contract.csv
      - 14_contracts/figure_contract.csv
    rule: >
      No figure blueprint or caption may be promoted unless it references a valid
      result_id or explicitly records why no result_id is needed.
  citation_bound_references:
    required_contracts:
      - 14_contracts/citation_contract.csv
    rule: >
      Citations may support background, method choice, or assumptions. Citation
      metadata alone may not support numerical results.
  fact_preserving_polish:
    required_contracts:
      - 14_contracts/artifact_freeze_registry.csv
      - 14_contracts/polish_diff_check.csv
    protected_atoms:
      - numbers
      - formulas
      - labels
      - references
      - citations
      - model_names
      - result_meanings
    rule: >
      Polish outputs must preserve protected atoms exactly unless a human explicitly
      approves the change and a revision task records the reason.

# ---------------------------------------------------------------------
# 10. Human confirmation policy
# ---------------------------------------------------------------------

human_confirmation_policy:
  required_when:
    - skill_output_changes_model_choice
    - skill_output_changes_claim_strength
    - skill_output_promotes_figure_to_paper
    - skill_output_resolves_fail_level_review_item
    - skill_output_requires_waiving_validation_failure
    - skill_output_used_after_final_freeze
    - skill_output_conflicts_with_existing_contract
    - skill_output_changes_paper_structure_after_paper_full
    - skill_output_targets_final_export
  allowed_human_decisions:
    - accept
    - accept_with_edits
    - reject
    - archive_only
    - retry_with_constraints
    - return_to_upstream_stage
    - waive_with_reason
  decision_record_fields:
    - decision_id
    - timestamp
    - stage_id
    - skill_id
    - decision_summary
    - options
    - selected_option
    - recommended_option
    - risk_if_wrong
    - human_reason
    - record_target
  record_targets:
    - DECISIONS.md
    - 15_iteration_memory/decision_log.md
    - 10_ai_logs/skill_usage_log.csv

# ---------------------------------------------------------------------
# 11. Failure policy
# ---------------------------------------------------------------------

failure_policy:
  max_retries:
    per_skill_call: 1
    per_stage_skill_total: 2
  failure_codes:
    SKILL_NOT_INSTALLED:
      severity: warning_or_block
      default_action: skip_if_optional_block_if_required
      recovery: record_missing_skill_and_continue_if_noncritical
    UNKNOWN_SKILL:
      severity: fail
      default_action: deny_call
      recovery: register_skill_in_policy_before_use
    STAGE_NOT_ALLOWED:
      severity: fail
      default_action: deny_call
      recovery: return_to_stage_prompt_or_update_policy_after_human_approval
    LEGACY_STAGE_NAME:
      severity: fail
      default_action: deny_call
      recovery: use_real_workflow_stage_name
    REQUIRED_INPUT_MISSING:
      severity: block
      default_action: do_not_call_skill
      recovery: return_to_owner_stage_to_create_missing_input
    CONTRACT_MISSING:
      severity: block
      default_action: do_not_call_skill
      recovery: create_contract_scaffold_in_owner_stage_only
    CONTRACT_INVALID:
      severity: fail
      default_action: block_promotion
      recovery: run_validate_contracts_and_return_to_contract_owner
    OUTPUT_PATH_VIOLATION:
      severity: fail
      default_action: discard_output
      recovery: rewrite_output_to_archive_only
    FABRICATED_DATA_OR_RESULT:
      severity: fail
      default_action: discard_output
      recovery: require_code_backed_result_contract_row
    FABRICATED_CITATION:
      severity: fail
      default_action: discard_output
      recovery: require_verified_citation_metadata_or_mark_citation_gap
    PRIOR_COPY_RISK:
      severity: fail
      default_action: discard_or_abstract_to_card
      recovery: rewrite_as_non_textual_experience_card
    PROTECTED_ATOM_CHANGED:
      severity: fail
      default_action: reject_polish_diff
      recovery: regenerate_polish_preserving_numbers_formulas_labels_citations
    VALIDATION_FAILED:
      severity: major
      default_action: block_promotion
      recovery: retry_once_then_create_review_or_revision_task
    HUMAN_CONFIRMATION_REQUIRED:
      severity: pause
      default_action: pause_stage
      recovery: ask_human_and_log_decision
    UNKNOWN_SKILL_OUTPUT:
      severity: warning
      default_action: archive_only
      recovery: do_not_promote_until_output_type_is_registered
  fallback_order:
    - archive_output_as_advisory_only
    - retry_once_with_stronger_constraints_if_safe
    - skip_optional_skill
    - create_stage_blocker_note
    - create_revision_task_if_downstream_impact_exists
    - ask_human_if_decision_cannot_be_recovered_safely

# ---------------------------------------------------------------------
# 12. Stage summary requirements
# ---------------------------------------------------------------------

stage_summary_requirements:
  every_stage_summary_must_record:
    - skill_calls_attempted
    - skill_calls_succeeded
    - skill_calls_skipped
    - skill_calls_blocked
    - archived_outputs
    - promoted_outputs
    - validation_status
    - human_decisions_needed
  recommended_stage_summary_targets:
    eda: 04_eda/eda_report.md
    prior_retrieval: 13_sample_prior/sample_prior_summary.md
    figures: 08_figures/figure_design_review.csv
    paper_draft: 09_paper/draft_v1.md
    paper_full: 09_paper/anchor_consistency_check.md
    auto_review: 11_review/review_scorecard.csv
    revision: 15_iteration_memory/task_closure_log.md
    polish: 09_paper/polish_diff_log.md
    final_export: 12_submission/submission_checklist.md

# ---------------------------------------------------------------------
# 13. Validation hooks
# ---------------------------------------------------------------------

validation_hooks:
  before_skill_call:
    - validate_stage_identity
    - validate_skill_permission
    - validate_required_inputs
  after_skill_archive:
    - validate_archive_path
    - update_skill_usage_log
  before_promotion:
    - validate_output_type
    - validate_promotion_target
    - validate_contract_binding
    - validate_human_gate_if_required
  recommended_commands:
    general_contract_validation:
      - python scripts/validate_contracts.py
    gate_validation:
      - python scripts/check_gates.py
    figure_validation:
      - python scripts/check_figure_quality.py
    export_validation:
      - python scripts/validate_v32_export.py

# ---------------------------------------------------------------------
# 14. Compatibility with older config
# ---------------------------------------------------------------------

compatibility:
  old_config_file: config/skill_enhancement.yaml
  old_config_status: legacy_reference_only
  router_source_of_truth: config/skill_router_policy.yaml
  migration_notes:
    - replace_legacy_stage_literature_with_paper_draft_or_paper_full
    - replace_legacy_stage_data_with_eda
    - keep_nature_skills_modes_but_enforce_permissions_and_preflight_checks
    - require_all_skill_outputs_to_be_archived_before_promotion
