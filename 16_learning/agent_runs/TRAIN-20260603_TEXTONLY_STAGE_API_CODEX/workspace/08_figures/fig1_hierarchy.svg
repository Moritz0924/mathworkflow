<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="SimHei, Arial, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <!-- 顶层 -->
  <rect x="300" y="30" width="200" height="50" fill="#2c3e50" rx="5"/>
  <text x="400" y="62" fill="#ecf0f1" text-anchor="middle" font-size="16" font-weight="bold">城市交通拥堵评价</text>
  <!-- 连线 -->
  <line x1="400" y1="80" x2="200" y2="130" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="400" y1="80" x2="400" y2="130" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="400" y1="80" x2="600" y2="130" stroke="#7f8c8d" stroke-width="2"/>
  <!-- 第二层 -->
  <rect x="100" y="130" width="200" height="45" fill="#34495e" rx="5"/>
  <text x="200" y="158" fill="#ecf0f1" text-anchor="middle" font-size="14">交通供给指标</text>
  <rect x="300" y="130" width="200" height="45" fill="#34495e" rx="5"/>
  <text x="400" y="158" fill="#ecf0f1" text-anchor="middle" font-size="14">交通需求指标</text>
  <rect x="500" y="130" width="200" height="45" fill="#34495e" rx="5"/>
  <text x="600" y="158" fill="#ecf0f1" text-anchor="middle" font-size="14">交通运行指标</text>
  <!-- 连线到第三层 -->
  <line x1="200" y1="175" x2="130" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="200" y1="175" x2="200" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="200" y1="175" x2="270" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="400" y1="175" x2="330" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="400" y1="175" x2="400" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="400" y1="175" x2="470" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="600" y1="175" x2="530" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="600" y1="175" x2="600" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="600" y1="175" x2="670" y2="230" stroke="#95a5a6" stroke-width="1.5"/>
  <!-- 第三层 -->
  <rect x="60" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="130" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">道路面积率</text>
  <rect x="130" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="200" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">公交站点密度</text>
  <rect x="200" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="270" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">停车泊位数</text>
  <rect x="260" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="330" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">人口密度</text>
  <rect x="330" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="400" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">机动车保有量</text>
  <rect x="400" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="470" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">出行生成率</text>
  <rect x="460" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="530" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">平均行程速度</text>
  <rect x="530" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="600" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">拥堵延时指数</text>
  <rect x="600" y="230" width="140" height="40" fill="#4a6984" rx="3"/>
  <text x="670" y="255" fill="#ecf0f1" text-anchor="middle" font-size="12">公交分担率</text>
  <!-- 标题 -->
  <text x="400" y="580" fill="#2c3e50" text-anchor="middle" font-size="14">图1：城市交通拥堵评价指标体系层级结构</text>
</svg>