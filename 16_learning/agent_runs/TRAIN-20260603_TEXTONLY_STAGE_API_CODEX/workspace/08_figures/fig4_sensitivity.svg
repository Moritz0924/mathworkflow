<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="SimHei, Arial, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="40" fill="#2c3e50" text-anchor="middle" font-size="18" font-weight="bold">权重敏感性分析 — 排名变化龙卷风图</text>
  <!-- 基础排名（虚线） -->
  <line x1="400" y1="80" x2="400" y2="500" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="405" y="75" font-size="12" fill="#e74c3c">基准排名</text>
  <!-- 各指标条形 -->
  <!-- 拥堵延时指数 -->
  <rect x="300" y="110" width="100" height="25" fill="#1f78b4" rx="3"/>
  <rect x="400" y="110" width="80" height="25" fill="#1f78b4" rx="3" opacity="0.7"/>
  <text x="280" y="128" text-anchor="end" font-size="14" fill="#2c3e50">拥堵延时</text>
  <!-- 平均速度 -->
  <rect x="340" y="160" width="60" height="25" fill="#33a02c" rx="3"/>
  <rect x="400" y="160" width="60" height="25" fill="#33a02c" rx="3" opacity="0.7"/>
  <text x="320" y="178" text-anchor="end" font-size="14" fill="#2c3e50">平均速度</text>
  <!-- 公交分担率 -->
  <rect x="350" y="210" width="50" height="25" fill="#ff7f00" rx="3"/>
  <rect x="400" y="210" width="70" height="25" fill="#ff7f00" rx="3" opacity="0.7"/>
  <text x="330" y="228" text-anchor="end" font-size="14" fill="#2c3e50">公交分担率</text>
  <!-- 道路密度 -->
  <rect x="370" y="260" width="30" height="25" fill="#6a3d9a" rx="3"/>
  <rect x="400" y="260" width="40" height="25" fill="#6a3d9a" rx="3" opacity="0.7"/>
  <text x="350" y="278" text-anchor="end" font-size="14" fill="#2c3e50">道路密度</text>
  <!-- 停车供给 -->
  <rect x="380" y="310" width="20" height="25" fill="#b15928" rx="3"/>
  <rect x="400" y="310" width="50" height="25" fill="#b15928" rx="3" opacity="0.7"/>
  <text x="360" y="328" text-anchor="end" font-size="14" fill="#2c3e50">停车供给</text>
  <!-- 轴标签 -->
  <text x="200" y="500" font-size="12" fill="#7f8c8d">← 权重减少方向</text>
  <text x="500" y="500" font-size="12" fill="#7f8c8d">权重增加方向 →</text>
  <!-- 图例 -->
  <rect x="550" y="400" width="180" height="60" fill="#f9f9f9" stroke="#ccc" rx="5"/>
  <rect x="560" y="410" width="20" height="10" fill="#1f78b4" rx="2"/>
  <text x="590" y="420" font-size="12" fill="#2c3e50">权重减少时排名</text>
  <rect x="560" y="435" width="20" height="10" fill="#1f78b4" opacity="0.7" rx="2"/>
  <text x="590" y="445" font-size="12" fill="#2c3e50">权重增加时排名</text>
  <!-- 图注 -->
  <text x="400" y="550" fill="#7f8c8d" text-anchor="middle" font-size="12">图4：各指标权重在±20%变化下对城市综合排名的影响</text>
</svg>