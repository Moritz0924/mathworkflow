<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="SimHei, Arial, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <!-- 标题 -->
  <text x="400" y="40" fill="#2c3e50" text-anchor="middle" font-size="18" font-weight="bold">城市交通拥堵综合得分热力图</text>
  <!-- 热力格子 6x5, 每个80x50 -->
  <!-- 数据矩阵 (虚拟) -->
  <defs>
    <linearGradient id="heat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d73027"/>
      <stop offset="25%" stop-color="#fc8d59"/>
      <stop offset="50%" stop-color="#fee090"/>
      <stop offset="75%" stop-color="#91bfdb"/>
      <stop offset="100%" stop-color="#4575b4"/>
    </linearGradient>
  </defs>
  <!-- 行标签 -->
  <g font-size="14" fill="#2c3e50">
    <text x="80" y="115" text-anchor="end">城市A</text>
    <text x="80" y="175" text-anchor="end">城市B</text>
    <text x="80" y="235" text-anchor="end">城市C</text>
    <text x="80" y="295" text-anchor="end">城市D</text>
    <text x="80" y="355" text-anchor="end">城市E</text>
    <text x="80" y="415" text-anchor="end">城市F</text>
  </g>
  <!-- 列标签 -->
  <g font-size="13" fill="#2c3e50" text-anchor="middle">
    <text x="180" y="75">拥堵延时</text>
    <text x="280" y="75">平均速度</text>
    <text x="380" y="75">公交分担</text>
    <text x="480" y="75">道路密度</text>
    <text x="580" y="75">停车供给</text>
  </g>
  <!-- 格子 (随机颜色表示) -->
  <rect x="110" y="90" width="80" height="50" fill="#d73027" rx="2"/>
  <rect x="200" y="90" width="80" height="50" fill="#fc8d59" rx="2"/>
  <rect x="290" y="90" width="80" height="50" fill="#fee090" rx="2"/>
  <rect x="380" y="90" width="80" height="50" fill="#91bfdb" rx="2"/>
  <rect x="470" y="90" width="80" height="50" fill="#4575b4" rx="2"/>

  <rect x="110" y="150" width="80" height="50" fill="#fc8d59" rx="2"/>
  <rect x="200" y="150" width="80" height="50" fill="#fee090" rx="2"/>
  <rect x="290" y="150" width="80" height="50" fill="#91bfdb" rx="2"/>
  <rect x="380" y="150" width="80" height="50" fill="#4575b4" rx="2"/>
  <rect x="470" y="150" width="80" height="50" fill="#d73027" rx="2"/>

  <rect x="110" y="210" width="80" height="50" fill="#fee090" rx="2"/>
  <rect x="200" y="210" width="80" height="50" fill="#91bfdb" rx="2"/>
  <rect x="290" y="210" width="80" height="50" fill="#4575b4" rx="2"/>
  <rect x="380" y="210" width="80" height="50" fill="#d73027" rx="2"/>
  <rect x="470" y="210" width="80" height="50" fill="#fc8d59" rx="2"/>

  <rect x="110" y="270" width="80" height="50" fill="#91bfdb" rx="2"/>
  <rect x="200" y="270" width="80" height="50" fill="#4575b4" rx="2"/>
  <rect x="290" y="270" width="80" height="50" fill="#d73027" rx="2"/>
  <rect x="380" y="270" width="80" height="50" fill="#fc8d59" rx="2"/>
  <rect x="470" y="270" width="80" height="50" fill="#fee090" rx="2"/>

  <rect x="110" y="330" width="80" height="50" fill="#4575b4" rx="2"/>
  <rect x="200" y="330" width="80" height="50" fill="#d73027" rx="2"/>
  <rect x="290" y="330" width="80" height="50" fill="#fc8d59" rx="2"/>
  <rect x="380" y="330" width="80" height="50" fill="#fee090" rx="2"/>
  <rect x="470" y="330" width="80" height="50" fill="#91bfdb" rx="2"/>

  <rect x="110" y="390" width="80" height="50" fill="#d73027" rx="2"/>
  <rect x="200" y="390" width="80" height="50" fill="#fc8d59" rx="2"/>
  <rect x="290" y="390" width="80" height="50" fill="#fee090" rx="2"/>
  <rect x="380" y="390" width="80" height="50" fill="#91bfdb" rx="2"/>
  <rect x="470" y="390" width="80" height="50" fill="#4575b4" rx="2"/>

  <!-- 颜色条 -->
  <rect x="650" y="90" width="20" height="350" fill="url(#heat)"/>
  <text x="680" y="105" font-size="12" fill="#2c3e50">高</text>
  <text x="680" y="440" font-size="12" fill="#2c3e50">低</text>
  <!-- 图注 -->
  <text x="400" y="520" fill="#7f8c8d" text-anchor="middle" font-size="12">图2：各城市交通拥堵指标综合得分分布（颜色越深表示得分越差）</text>
</svg>