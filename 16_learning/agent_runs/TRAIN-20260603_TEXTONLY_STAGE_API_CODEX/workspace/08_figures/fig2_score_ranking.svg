<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400">
  <style>
    text { font-family: 'SimHei', 'Microsoft YaHei', sans-serif; fill: #222; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .axis-label { font-size: 14px; text-anchor: middle; }
    .bar-label { font-size: 13px; fill: #fff; text-anchor: start; }
    .score-label { font-size: 12px; fill: #222; text-anchor: start; }
  </style>
  <rect width="500" height="400" fill="#ffffff"/>
  <text x="250" y="30" class="title">城市综合得分排序</text>
  <!-- x-axis -->
  <line x1="150" y1="340" x2="480" y2="340" stroke="#333" stroke-width="1.5"/>
  <text x="315" y="380" class="axis-label">综合得分</text>
  <!-- Bars and labels -->
  <!-- 北京 score 0.82 -->
  <rect x="150" y="90" width="260" height="45" fill="#3A7CA5" stroke="#D4A373" stroke-width="2"/>
  <text x="160" y="117" class="bar-label">北京</text>
  <text x="420" y="117" class="score-label">0.82</text>
  <!-- 深圳 score 0.76 -->
  <rect x="150" y="150" width="240" height="45" fill="#3A7CA5" stroke="#D4A373" stroke-width="2"/>
  <text x="160" y="177" class="bar-label">深圳</text>
  <text x="400" y="177" class="score-label">0.76</text>
  <!-- 上海 score 0.69 -->
  <rect x="150" y="210" width="210" height="45" fill="#3A7CA5" stroke="#D4A373" stroke-width="2"/>
  <text x="160" y="237" class="bar-label">上海</text>
  <text x="370" y="237" class="score-label">0.69</text>
  <!-- 广州 score 0.64 -->
  <rect x="150" y="270" width="190" height="45" fill="#3A7CA5" stroke="#D4A373" stroke-width="2"/>
  <text x="160" y="297" class="bar-label">广州</text>
  <text x="350" y="297" class="score-label">0.64</text>
</svg>