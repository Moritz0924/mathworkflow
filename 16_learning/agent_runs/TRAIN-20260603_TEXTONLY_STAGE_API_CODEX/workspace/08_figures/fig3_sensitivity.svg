<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450">
  <style>
    text { font-family: 'SimHei', 'Microsoft YaHei', sans-serif; fill: #222; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .axis-label { font-size: 14px; text-anchor: middle; }
    .tick-label { font-size: 12px; text-anchor: middle; }
    .cell-text { font-size: 11px; text-anchor: middle; dominant-baseline: central; fill: #000; }
  </style>
  <rect width="600" height="450" fill="#ffffff"/>
  <text x="300" y="35" class="title">参数敏感性热力图</text>
  <text x="30" y="230" transform="rotate(-90,30,230)" class="axis-label">受扰动参数</text>
  <text x="420" y="435" class="axis-label">城市排名变化</text>
  <!-- Heatmap cells: 5 parameters (rows) x 4 cities (cols) -->
  <!-- Row 1: 公交分担率 -->
  <rect x="150" y="80" width="80" height="50" fill="#d7191c"/>
  <text x="190" y="105" class="cell-text">-0.8</text>
  <rect x="240" y="80" width="80" height="50" fill="#fdae61"/>
  <text x="280" y="105" class="cell-text">-0.4</text>
  <rect x="330" y="80" width="80" height="50" fill="#abd9e9"/>
  <text x="370" y="105" class="cell-text">0.2</text>
  <rect x="420" y="80" width="80" height="50" fill="#2c7bb6"/>
  <text x="460" y="105" class="cell-text">0.6</text>
  <!-- Row 2: 拥堵指数 -->
  <rect x="150" y="140" width="80" height="50" fill="#fdae61"/>
  <text x="190" y="165" class="cell-text">-0.3</text>
  <rect x="240" y="140" width="80" height="50" fill="#ffffbf"/>
  <text x="280" y="165" class="cell-text">0.0</text>
  <rect x="330" y="140" width="80" height="50" fill="#abd9e9"/>
  <text x="370" y="165" class="cell-text">0.1</text>
  <rect x="420" y="140" width="80" height="50" fill="#fdae61"/>
  <text x="460" y="165" class="cell-text">-0.2</text>
  <!-- Row 3: 空气质量 -->
  <rect x="150" y="200" width="80" height="50" fill="#ffffbf"/>
  <text x="190" y="225" class="cell-text">0.0</text>
  <rect x="240" y="200" width="80" height="50" fill="#abd9e9"/>
  <text x="280" y="225" class="cell-text">0.1</text>
  <rect x="330" y="200" width="80" height="50" fill="#ffffbf"/>
  <text x="370" y="225" class="cell-text">0.0</text>
  <rect x="420" y="200" width="80" height="50" fill="#fdae61"/>
  <text x="460" y="225" class="cell-text">-0.1</text>
  <!-- Row 4: 路网密度 -->
  <rect x="150" y="260" width="80" height="50" fill="#abd9e9"/>
  <text x="190" y="285" class="cell-text">0.3</text>
  <rect x="240" y="260" width="80" height="50" fill="#2c7bb6"/>
  <text x="280" y="285" class="cell-text">0.5</text>
  <rect x="330" y="260" width="80" height="50" fill="#fdae61"/>
  <text x="370" y="285" class="cell-text">-0.2</text>
  <rect x="420" y="260" width="80" height="50" fill="#ffffbf"/>
  <text x="460" y="285" class="cell-text">0.0</text>
  <!-- Row 5: 停车设施 -->
  <rect x="150" y="320" width="80" height="50" fill="#ffffbf"/>
  <text x="190" y="345" class="cell-text">0.0</text>
  <rect x="240" y="320" width="80" height="50" fill="#abd9e9"/>
  <text x="280" y="345" class="cell-text">0.1</text>
  <rect x="330" y="320" width="80" height="50" fill="#fdae61"/>
  <text x="370" y="345" class="cell-text">-0.1</text>
  <rect x="420" y="320" width="80" height="50" fill="#ffffbf"/>
  <text x="460" y="345" class="cell-text">0.0</text>
  <!-- Row labels -->
  <text x="130" y="105" class="tick-label" text-anchor="end">公交分担率</text>
  <text x="130" y="165" class="tick-label" text-anchor="end">拥堵指数</text>
  <text x="130" y="225" class="tick-label" text-anchor="end">空气质量</text>
  <text x="130" y="285" class="tick-label" text-anchor="end">路网密度</text>
  <text x="130" y="345" class="tick-label" text-anchor="end">停车设施</text>
  <!-- Column labels -->
  <text x="190" y="65" class="tick-label">北京</text>
  <text x="280" y="65" class="tick-label">上海</text>
  <text x="370" y="65" class="tick-label">广州</text>
  <text x="460" y="65" class="tick-label">深圳</text>
  <!-- color bar legend -->
  <rect x="530" y="80" width="20" height="280" fill="url(#sensGrad)"/>
  <defs>
    <linearGradient id="sensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7191c"/>
      <stop offset="33%" stop-color="#fdae61"/>
      <stop offset="50%" stop-color="#ffffbf"/>
      <stop offset="66%" stop-color="#abd9e9"/>
      <stop offset="100%" stop-color="#2c7bb6"/>
    </linearGradient>
  </defs>
</svg>