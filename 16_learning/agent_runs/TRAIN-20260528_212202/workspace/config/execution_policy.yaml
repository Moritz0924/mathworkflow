version: v3.2-mvp
mode: deep_sequential

parallel_execution:
  enabled: false
  allow_multi_stage: false
  allow_multi_question_codegen: false
  allow_full_paper_one_shot: false

stage_flow:
  ordered_stages:
    - latex_template
    - intake
    - eda
    - task_analysis
    - prior_retrieval
    - model_route
    - codegen
    - results_freeze
    - figures
    - paper_draft
    - paper_full
    - auto_review
    - revision
    - polish
    - compile
    - final_export
  allow_stage_skip: false
  allow_stage_backtrack: true
  require_state_lock: true

quality_policy:
  priority: highest
  require_stage_summary: true
  require_risk_report: true
  require_human_gate: true
  require_source_trace: true
  require_contract_validation: true
  require_review_closure: true

generation_policy:
  paper_generation: section_by_section
  model_codegen: question_by_question
  polish: section_by_section
  figure_generation: result_bound_only
  review_generation: reviewer_tasks_only
  ppt_generation: post_final_only

human_gates:
  after_stages:
    model_route: model_route_gate
    results_freeze: results_freeze_gate
    paper_full: draft_review_gate
    revision: revision_closure_gate
    compile: final_submission_gate

forbidden_actions:
  - generate_full_paper_before_results
  - write_result_without_model_output
  - write_claim_without_evidence
  - cite_unregistered_figure
  - cite_unverified_reference
  - change_frozen_result_during_polish
  - skip_human_gate
  - parallel_stage_execution
  - use_fast_mode
  - copy_prior_paper_text
  - allow_reviewer_direct_edit
