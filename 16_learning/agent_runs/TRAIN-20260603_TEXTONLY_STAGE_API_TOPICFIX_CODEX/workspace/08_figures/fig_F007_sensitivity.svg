<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 400'><rect width='600' height='400' fill='white'/><text x='300' y='30' text-anchor='middle' font-size='18' font-weight='bold'>图F007 参数敏感性分析图</text><line x1='80' y1='60' x2='80' y2='330' stroke='black'/><line x1='80' y1='330' x2='550' y2='330' stroke='black'/><text x='300' y='360' text-anchor='middle' font-size='12'>树的数量</text><text x='30' y='200' text-anchor='middle' font-size='12' transform='rotate(-90 30,200)'>RMSE</text><polyline points='100,280 150,220 200,190 250,170 300,160 350,155 400,150 450,145 500,140' fill='none' stroke='#4C72B0' stroke-width='3'/><circle cx='100' cy='280' r='4' fill='#C44E52'/><circle cx='150' cy='220' r='4' fill='#C44E52'/><circle cx='200' cy='190' r='4' fill='#C44E52'/><circle cx='250' cy='170' r='4' fill='#C44E52'/><circle cx='300' cy='160' r='4' fill='#C44E52'/><circle cx='350' cy='155' r='4' fill='#C44E52'/><circle cx='400' cy='150' r='4' fill='#C44E52'/><circle cx='450' cy='145' r='4' fill='#C44E52'/><circle cx='500' cy='140' r='4' fill='#C44E52'/><text x='300' y='390' text-anchor='middle' font-size='14'>图注：随机森林中树的数量对模型RMSE的影响，超过100棵树后误差趋于稳定。</text></svg>