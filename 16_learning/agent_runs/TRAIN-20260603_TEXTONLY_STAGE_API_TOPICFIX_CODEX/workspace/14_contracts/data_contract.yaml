data_sources:
  - name: orders
    path: 03_data/raw/orders.csv
    description: Order records with pick locations, deadlines, priorities
    fields: [order_id, pick_x, pick_y, deadline, priority, sku_id, quantity, created_at]
    primary_key: order_id
    quality_notes: 0.2% missing deadline, 0.5% missing priority, 3 negative lead times
  - name: agv_status
    path: 03_data/raw/agv_status.csv
    description: Initial AGV states including position, speed, battery
    fields: [agv_id, initial_x, initial_y, speed, battery_capacity, battery_level, status]
    primary_key: agv_id
    quality_notes: 2.3% missing battery_level, 2 AGVs speed=0
  - name: warehouse_map
    path: 03_data/raw/warehouse_map.json
    description: Grid layout, aisles, obstacles, station positions
    fields: [grid_width, grid_height, aisles, obstacles, stations]
    quality_notes: None
  - name: inventory
    path: 03_data/raw/inventory.csv
    description: SKU storage locations and stock levels
    fields: [sku_id, storage_x, storage_y, shelf_level, stock, weight_per_unit]
    primary_key: sku_id
    quality_notes: 12% missing weight_per_unit, one stock=0 conflict
version: draft
last_updated: 2025-06-03
