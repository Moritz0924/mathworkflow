<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="SimHei, sans-serif">交叉口饱和度热力图</text>
  <!-- Simulated heatmap with colored rectangles -->
  <rect x="150" y="100" width="80" height="80" fill="#E5F5E0"/>
  <rect x="230" y="100" width="80" height="80" fill="#A1D99B"/>
  <rect x="310" y="100" width="80" height="80" fill="#31A354"/>
  <rect x="390" y="100" width="80" height="80" fill="#A1D99B"/>
  <rect x="150" y="180" width="80" height="80" fill="#FEE0D2"/>
  <rect x="230" y="180" width="80" height="80" fill="#FC9272"/>
  <rect x="310" y="180" width="80" height="80" fill="#DE2D26"/>
  <rect x="390" y="180" width="80" height="80" fill="#FC9272"/>
  <rect x="150" y="260" width="80" height="80" fill="#E5F5E0"/>
  <rect x="230" y="260" width="80" height="80" fill="#A1D99B"/>
  <rect x="310" y="260" width="80" height="80" fill="#31A354"/>
  <rect x="390" y="260" width="80" height="80" fill="#A1D99B"/>
  <rect x="150" y="340" width="80" height="80" fill="#FEE0D2"/>
  <rect x="230" y="340" width="80" height="80" fill="#FC9272"/>
  <rect x="310" y="340" width="80" height="80" fill="#DE2D26"/>
  <rect x="390" y="340" width="80" height="80" fill="#FC9272"/>
  <!-- Axes labels -->
  <text x="190" y="90" font-size="14" fill="#333" font-family="SimHei, sans-serif">早高峰</text>
  <text x="270" y="90" font-size="14" fill="#333" font-family="SimHei, sans-serif">午间</text>
  <text x="350" y="90" font-size="14" fill="#333" font-family="SimHei, sans-serif">晚高峰</text>
  <text x="430" y="90" font-size="14" fill="#333" font-family="SimHei, sans-serif">夜间</text>
  <text x="80" y="145" font-size="14" fill="#333" font-family="SimHei, sans-serif">路口A</text>
  <text x="80" y="225" font-size="14" fill="#333" font-family="SimHei, sans-serif">路口B</text>
  <text x="80" y="305" font-size="14" fill="#333" font-family="SimHei, sans-serif">路口C</text>
  <text x="80" y="385" font-size="14" fill="#333" font-family="SimHei, sans-serif">路口D</text>
  <!-- Color bar -->
  <rect x="550" y="150" width="20" height="200" fill="url(#grad)"/>
  <text x="520" y="150" font-size="12" fill="#333" font-family="SimHei, sans-serif">1.0</text>
  <text x="520" y="350" font-size="12" fill="#333" font-family="SimHei, sans-serif">0.0</text>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DE2D26"/>
      <stop offset="50%" stop-color="#FC9272"/>
      <stop offset="100%" stop-color="#E5F5E0"/>
    </linearGradient>
  </defs>
  <text x="400" y="550" text-anchor="middle" font-size="14" fill="#333" font-family="SimHei, sans-serif">饱和度 (0-1)</text>
</svg>
