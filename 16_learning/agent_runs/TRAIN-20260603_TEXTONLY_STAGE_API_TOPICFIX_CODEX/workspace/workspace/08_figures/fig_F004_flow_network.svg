<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="SimHei, sans-serif">交通流网络拓扑结构</text>
  <!-- Nodes -->
  <circle cx="200" cy="150" r="30" fill="#4C72B0" opacity="0.8"/>
  <text x="200" y="155" text-anchor="middle" fill="white" font-family="SimHei, sans-serif" font-size="14">省(市)</text>
  <circle cx="600" cy="150" r="30" fill="#4C72B0" opacity="0.8"/>
  <text x="600" y="155" text-anchor="middle" fill="white" font-family="SimHei, sans-serif" font-size="14">市(区)</text>
  <circle cx="200" cy="400" r="30" fill="#4C72B0" opacity="0.8"/>
  <text x="200" y="405" text-anchor="middle" fill="white" font-family="SimHei, sans-serif" font-size="14">郊(县)</text>
  <circle cx="600" cy="400" r="30" fill="#4C72B0" opacity="0.8"/>
  <text x="600" y="405" text-anchor="middle" fill="white" font-family="SimHei, sans-serif" font-size="14">农(村)</text>
  <!-- Edges -->
  <line x1="230" y1="150" x2="570" y2="150" stroke="#E07B39" stroke-width="4"/>
  <line x1="230" y1="150" x2="570" y2="400" stroke="#E07B39" stroke-width="3"/>
  <line x1="200" y1="180" x2="200" y2="370" stroke="#E07B39" stroke-width="3"/>
  <line x1="600" y1="180" x2="600" y2="370" stroke="#E07B39" stroke-width="5"/>
  <line x1="230" y1="400" x2="570" y2="400" stroke="#E07B39" stroke-width="2"/>
  <!-- Flow arrows (simplified) -->
  <polygon points="570,145 585,150 570,155" fill="#E07B39"/>
  <polygon points="585,395 570,400 585,405" fill="#E07B39"/>
  <text x="400" y="130" font-size="12" fill="#E07B39" font-family="SimHei, sans-serif">通勤流</text>
  <text x="610" y="280" font-size="12" fill="#E07B39" font-family="SimHei, sans-serif">主要干道</text>
</svg>
