<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="SimHei, sans-serif">参数敏感性分析热力图</text>
  <!-- Heatmap grid with colors -->
  <!-- Row1 -->
  <rect x="150" y="100" width="80" height="40" fill="#0571B0"/>
  <rect x="230" y="100" width="80" height="40" fill="#92C5DE"/>
  <rect x="310" y="100" width="80" height="40" fill="#F7F7F7"/>
  <rect x="390" y="100" width="80" height="40" fill="#F4A582"/>
  <rect x="470" y="100" width="80" height="40" fill="#CA0020"/>
  <!-- Row2 -->
  <rect x="150" y="140" width="80" height="40" fill="#92C5DE"/>
  <rect x="230" y="140" width="80" height="40" fill="#F7F7F7"/>
  <rect x="310" y="140" width="80" height="40" fill="#F4A582"/>
  <rect x="390" y="140" width="80" height="40" fill="#CA0020"/>
  <rect x="470" y="140" width="80" height="40" fill="#CA0020"/>
  <!-- Row3 -->
  <rect x="150" y="180" width="80" height="40" fill="#F7F7F7"/>
  <rect x="230" y="180" width="80" height="40" fill="#F4A582"/>
  <rect x="310" y="180" width="80" height="40" fill="#CA0020"/>
  <rect x="390" y="180" width="80" height="40" fill="#CA0020"/>
  <rect x="470" y="180" width="80" height="40" fill="#0571B0"/>
  <!-- Row4 -->
  <rect x="150" y="220" width="80" height="40" fill="#F4A582"/>
  <rect x="230" y="220" width="80" height="40" fill="#CA0020"/>
  <rect x="310" y="220" width="80" height="40" fill="#0571B0"/>
  <rect x="390" y="220" width="80" height="40" fill="#92C5DE"/>
  <rect x="470" y="220" width="80" height="40" fill="#F7F7F7"/>
  <!-- Axes labels -->
  <text x="190" y="90" font-size="12" fill="#333" font-family="SimHei, sans-serif">流量</text>
  <text x="270" y="90" font-size="12" fill="#333" font-family="SimHei, sans-serif">周期</text>
  <text x="350" y="90" font-size="12" fill="#333" font-family="SimHei, sans-serif">绿信比</text>
  <text x="430" y="90" font-size="12" fill="#333" font-family="SimHei, sans-serif">延误</text>
  <text x="500" y="90" font-size="12" fill="#333" font-family="SimHei, sans-serif">饱和度</text>
  <text x="80" y="125" font-size="12" fill="#333" font-family="SimHei, sans-serif">方案1</text>
  <text x="80" y="165" font-size="12" fill="#333" font-family="SimHei, sans-serif">方案2</text>
  <text x="80" y="205" font-size="12" fill="#333" font-family="SimHei, sans-serif">方案3</text>
  <text x="80" y="245" font-size="12" fill="#333" font-family="SimHei, sans-serif">方案4</text>
  <!-- Color bar -->
  <rect x="600" y="100" width="20" height="160" fill="url(#grad_sens)"/>
  <text x="560" y="100" font-size="12" fill="#333" font-family="SimHei, sans-serif">高</text>
  <text x="560" y="260" font-size="12" fill="#333" font-family="SimHei, sans-serif">低</text>
  <defs>
    <linearGradient id="grad_sens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CA0020"/>
      <stop offset="25%" stop-color="#F4A582"/>
      <stop offset="50%" stop-color="#F7F7F7"/>
      <stop offset="75%" stop-color="#92C5DE"/>
      <stop offset="100%" stop-color="#0571B0"/>
    </linearGradient>
  </defs>
</svg>
