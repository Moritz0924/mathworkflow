<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="SimHei, sans-serif">车辆轨迹仿真图</text>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="500" x2="100" y2="100" stroke="#333" stroke-width="2"/>
  <text x="400" y="550" text-anchor="middle" font-size="16" fill="#333" font-family="SimHei, sans-serif">时间 (秒)</text>
  <text x="30" y="300" text-anchor="middle" font-size="16" fill="#333" font-family="SimHei, sans-serif" transform="rotate(-90,30,300)">位置 (米)</text>
  <!-- Trajectories (deep blue and vermilion) -->
  <polyline points="100,450 200,420 300,380 400,350 500,300 600,280 700,200" stroke="#1B2A47" stroke-width="2" fill="none"/>
  <polyline points="100,470 200,440 300,400 400,370 500,340 600,310 700,250" stroke="#C62828" stroke-width="2" fill="none"/>
  <polyline points="100,480 200,460 300,430 400,400 500,370 600,350 700,300" stroke="#2E7D32" stroke-width="2" fill="none"/>
  <text x="700" y="195" font-size="12" fill="#1B2A47" font-family="SimHei, sans-serif">车辆A</text>
  <text x="700" y="245" font-size="12" fill="#C62828" font-family="SimHei, sans-serif">车辆B</text>
  <text x="700" y="295" font-size="12" fill="#2E7D32" font-family="SimHei, sans-serif">车辆C</text>
</svg>
