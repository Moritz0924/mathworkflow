<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="SimHei, sans-serif">特征重要性排序</text>
  <line x1="150" y1="500" x2="150" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="500" x2="700" y2="500" stroke="#333" stroke-width="2"/>
  <text x="425" y="550" text-anchor="middle" font-size="16" fill="#333" font-family="SimHei, sans-serif">相对重要性</text>
  <text x="20" y="300" text-anchor="middle" font-size="16" fill="#333" font-family="SimHei, sans-serif" transform="rotate(-90,20,300)">特征</text>
  <!-- Bars -->
  <rect x="150" y="440" width="300" height="30" fill="#4C72B0"/>
  <text x="460" y="460" font-size="14" fill="#333" font-family="SimHei, sans-serif">车流量</text>
  <rect x="150" y="380" width="220" height="30" fill="#DD8452"/>
  <text x="380" y="400" font-size="14" fill="#333" font-family="SimHei, sans-serif">信号周期</text>
  <rect x="150" y="320" width="180" height="30" fill="#55A868"/>
  <text x="340" y="340" font-size="14" fill="#333" font-family="SimHei, sans-serif">车道数</text>
  <rect x="150" y="260" width="140" height="30" fill="#C44E52"/>
  <text x="300" y="280" font-size="14" fill="#333" font-family="SimHei, sans-serif">绿信比</text>
  <rect x="150" y="200" width="100" height="30" fill="#8172B2"/>
  <text x="260" y="220" font-size="14" fill="#333" font-family="SimHei, sans-serif">渠化方案</text>
  <rect x="150" y="140" width="60" height="30" fill="#64B5F6"/>
  <text x="220" y="160" font-size="14" fill="#333" font-family="SimHei, sans-serif">天气</text>
</svg>
