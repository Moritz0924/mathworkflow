<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="SimHei, sans-serif">信号周期时长与延误关系</text>
  <!-- Axes -->
  <line x1="100" y1="500" x2="700" y2="500" stroke="#333333" stroke-width="2"/>
  <line x1="100" y1="500" x2="100" y2="100" stroke="#333333" stroke-width="2"/>
  <text x="400" y="550" text-anchor="middle" font-size="16" font-family="SimHei, sans-serif" fill="#333333">周期时长 (秒)</text>
  <text x="30" y="300" text-anchor="middle" font-size="16" font-family="SimHei, sans-serif" fill="#333333" transform="rotate(-90,30,300)">平均延误 (秒)</text>
  <!-- Data line (muted blue) -->
  <polyline points="150,400 250,350 350,320 450,300 550,290 650,295" stroke="#4C72B0" stroke-width="3" fill="none"/>
  <circle cx="150" cy="400" r="5" fill="#4C72B0"/>
  <circle cx="250" cy="350" r="5" fill="#4C72B0"/>
  <circle cx="350" cy="320" r="5" fill="#4C72B0"/>
  <circle cx="450" cy="300" r="5" fill="#4C72B0"/>
  <circle cx="550" cy="290" r="5" fill="#4C72B0"/>
  <circle cx="650" cy="295" r="5" fill="#4C72B0"/>
  <text x="650" y="280" font-size="12" fill="#4C72B0">最优</text>
  <!-- Legend -->
  <rect x="150" y="100" width="20" height="20" fill="#4C72B0"/>
  <text x="180" y="115" font-size="14" fill="#333333" font-family="SimHei, sans-serif">延误变化</text>
</svg>
