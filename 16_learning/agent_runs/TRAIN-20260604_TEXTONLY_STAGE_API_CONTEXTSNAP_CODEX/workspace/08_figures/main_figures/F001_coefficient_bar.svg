<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400">
  <style>
    .title { font: bold 18px 'Microsoft YaHei', sans-serif; fill: #333; }
    .axis { font: 12px 'Microsoft YaHei', sans-serif; fill: #666; }
    .bar { stroke: #fff; stroke-width: 1; }
  </style>
  <rect width="600" height="400" fill="#fff"/>
  <line x1="80" y1="50" x2="80" y2="350" stroke="black" stroke-width="1"/>
  <line x1="80" y1="250" x2="550" y2="250" stroke="black" stroke-width="1"/>
  <text x="300" y="30" text-anchor="middle" class="title">图F001: OLS回归系数估计值</text>
  <text x="300" y="380" text-anchor="middle" class="axis">变量</text>
  <rect x="120" y="218" width="80" height="32" fill="#4C72B0" class="bar"/>
  <text x="160" y="210" text-anchor="middle" class="axis">1.07</text>
  <text x="160" y="370" text-anchor="middle" class="axis">截距</text>
  <rect x="220" y="250" width="80" height="55" fill="#DD8452" class="bar"/>
  <text x="260" y="315" text-anchor="middle" class="axis">-1.82</text>
  <text x="260" y="370" text-anchor="middle" class="axis">R</text>
  <rect x="320" y="220" width="80" height="30" fill="#55A868" class="bar"/>
  <text x="360" y="210" text-anchor="middle" class="axis">1.00</text>
  <text x="360" y="370" text-anchor="middle" class="axis">G</text>
  <rect x="420" y="81" width="80" height="169" fill="#8B5A9E" class="bar"/>
  <text x="460" y="70" text-anchor="middle" class="axis">5.63</text>
  <text x="460" y="370" text-anchor="middle" class="axis">B</text>
  <text x="70" y="250" text-anchor="end" class="axis">0</text>
  <text x="70" y="100" text-anchor="end" class="axis">5</text>
  <text x="10" y="200" text-anchor="middle" transform="rotate(-90,10,200)" class="axis">系数值</text>
</svg>