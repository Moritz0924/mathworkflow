<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400">
  <style>
    .title { font: bold 18px 'Microsoft YaHei', sans-serif; fill: #333; }
    .axis { font: 12px 'Microsoft YaHei', sans-serif; fill: #666; }
    .point { fill: #4C72B0; stroke: #fff; }
  </style>
  <rect width="600" height="400" fill="#fff"/>
  <line x1="80" y1="350" x2="80" y2="50" stroke="black" stroke-width="1"/>
  <line x1="80" y1="350" x2="550" y2="350" stroke="black" stroke-width="1"/>
  <text x="300" y="30" text-anchor="middle" class="title">图F002: 预测浓度与真实浓度对比</text>
  <text x="300" y="380" text-anchor="middle" class="axis">真实浓度 (mg/L)</text>
  <text x="15" y="200" text-anchor="middle" transform="rotate(-90,15,200)" class="axis">预测浓度 (mg/L)</text>
  <!-- identity line -->
  <line x1="100" y1="330" x2="530" y2="70" stroke="#888" stroke-dasharray="5,5" stroke-width="1"/>
  <!-- scatter points (S01-S10 approximate predicted values) -->
  <circle cx="120" cy="320" r="5" class="point"/>
  <circle cx="160" cy="290" r="5" class="point"/>
  <circle cx="200" cy="260" r="5" class="point"/>
  <circle cx="240" cy="230" r="5" class="point"/>
  <circle cx="280" cy="200" r="5" class="point"/>
  <circle cx="320" cy="170" r="5" class="point"/>
  <circle cx="360" cy="140" r="5" class="point"/>
  <circle cx="400" cy="110" r="5" class="point"/>
  <circle cx="440" cy="80" r="5" class="point"/>
  <circle cx="480" cy="50" r="5" class="point"/>
  <text x="540" y="60" class="axis">R²=0.998</text>
  <text x="540" y="80" class="axis">RMSE=0.067</text>
</svg>