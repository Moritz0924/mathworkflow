<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400">
  <style>
    .title { font: bold 18px 'Microsoft YaHei', sans-serif; fill: #333; }
    .axis { font: 12px 'Microsoft YaHei', sans-serif; fill: #666; }
    .point { fill: #55A868; stroke: #fff; }
  </style>
  <rect width="600" height="400" fill="#fff"/>
  <line x1="80" y1="350" x2="80" y2="50" stroke="black" stroke-width="1"/>
  <line x1="80" y1="350" x2="550" y2="350" stroke="black" stroke-width="1"/>
  <text x="300" y="30" text-anchor="middle" class="title">图F004: 残差正态Q-Q图</text>
  <text x="300" y="380" text-anchor="middle" class="axis">理论分位数</text>
  <text x="15" y="200" text-anchor="middle" transform="rotate(-90,15,200)" class="axis">样本分位数</text>
  <!-- theoretical line -->
  <line x1="100" y1="330" x2="530" y2="70" stroke="#888" stroke-width="1"/>
  <!-- points near line -->
  <circle cx="120" cy="310" r="5" class="point"/>
  <circle cx="180" cy="260" r="5" class="point"/>
  <circle cx="240" cy="210" r="5" class="point"/>
  <circle cx="300" cy="160" r="5" class="point"/>
  <circle cx="360" cy="120" r="5" class="point"/>
  <circle cx="420" cy="80" r="5" class="point"/>
  <text x="540" y="100" class="axis">正态假设成立</text>
</svg>