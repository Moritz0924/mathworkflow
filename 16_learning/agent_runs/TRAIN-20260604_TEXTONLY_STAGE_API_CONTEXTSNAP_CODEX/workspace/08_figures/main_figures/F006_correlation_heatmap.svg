<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500">
  <style>
    .title { font: bold 18px 'Microsoft YaHei', sans-serif; fill: #333; }
    .celltext { font: 14px 'Microsoft YaHei', sans-serif; fill: #fff; text-anchor: middle; }
    .axis { font: 12px 'Microsoft YaHei', sans-serif; fill: #333; }
  </style>
  <rect width="500" height="500" fill="#fff"/>
  <text x="250" y="30" text-anchor="middle" class="title">图F006: 颜色通道与浓度相关性热力图</text>
  <!-- Grid 4x4: C, R, G, B -->
  <!-- Row 1 -->
  <rect x="100" y="80" width="80" height="80" fill="#1f77b4"/>
  <rect x="180" y="80" width="80" height="80" fill="#ff7f0e"/>
  <rect x="260" y="80" width="80" height="80" fill="#ff7f0e"/>
  <rect x="340" y="80" width="80" height="80" fill="#ff7f0e"/>
  <text x="140" y="125" class="celltext">1.00</text>
  <text x="220" y="125" class="celltext">-0.99</text>
  <text x="300" y="125" class="celltext">0.99</text>
  <text x="380" y="125" class="celltext">0.99</text>
  <!-- Row 2 -->
  <rect x="100" y="160" width="80" height="80" fill="#ff7f0e"/>
  <rect x="180" y="160" width="80" height="80" fill="#1f77b4"/>
  <rect x="260" y="160" width="80" height="80" fill="#d62728"/>
  <rect x="340" y="160" width="80" height="80" fill="#d62728"/>
  <text x="140" y="205" class="celltext">-0.99</text>
  <text x="220" y="205" class="celltext">1.00</text>
  <text x="300" y="205" class="celltext">-0.98</text>
  <text x="380" y="205" class="celltext">-0.97</text>
  <!-- Row 3 -->
  <rect x="100" y="240" width="80" height="80" fill="#ff7f0e"/>
  <rect x="180" y="240" width="80" height="80" fill="#d62728"/>
  <rect x="260" y="240" width="80" height="80" fill="#1f77b4"/>
  <rect x="340" y="240" width="80" height="80" fill="#2ca02c"/>
  <text x="140" y="285" class="celltext">0.99</text>
  <text x="220" y="285" class="celltext">-0.98</text>
  <text x="300" y="285" class="celltext">1.00</text>
  <text x="380" y="285" class="celltext">0.99</text>
  <!-- Row 4 -->
  <rect x="100" y="320" width="80" height="80" fill="#ff7f0e"/>
  <rect x="180" y="320" width="80" height="80" fill="#d62728"/>
  <rect x="260" y="320" width="80" height="80" fill="#2ca02c"/>
  <rect x="340" y="320" width="80" height="80" fill="#1f77b4"/>
  <text x="140" y="365" class="celltext">0.99</text>
  <text x="220" y="365" class="celltext">-0.97</text>
  <text x="300" y="365" class="celltext">0.99</text>
  <text x="380" y="365" class="celltext">1.00</text>
  <!-- axis labels -->
  <text x="140" y="60" class="axis">浓度</text>
  <text x="220" y="60" class="axis">R</text>
  <text x="300" y="60" class="axis">G</text>
  <text x="380" y="60" class="axis">B</text>
  <text x="80" y="125" class="axis">浓度</text>
  <text x="80" y="205" class="axis">R</text>
  <text x="80" y="285" class="axis">G</text>
  <text x="80" y="365" class="axis">B</text>
</svg>