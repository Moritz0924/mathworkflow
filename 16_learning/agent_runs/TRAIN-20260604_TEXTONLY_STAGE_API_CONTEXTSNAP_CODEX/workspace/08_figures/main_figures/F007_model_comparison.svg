<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' font-family='SimHei, sans-serif'>
  <rect width='100%' height='100%' fill='white'/>
  <text x='400' y='30' text-anchor='middle' font-size='22' fill='black'>三种模型留一交叉验证RMSE对比</text>
  <!-- Y axis -->
  <line x1='100' y1='50' x2='100' y2='420' stroke='black' stroke-width='2'/>
  <text x='70' y='235' text-anchor='middle' font-size='16' fill='black' transform='rotate(-90,70,235)'>CV RMSE (mg/L)</text>
  <!-- X axis -->
  <line x1='100' y1='420' x2='700' y2='420' stroke='black' stroke-width='2'/>
  <text x='400' y='460' text-anchor='middle' font-size='18' fill='black'>模 型</text>
  <!-- bars -->
  <rect x='180' y='355' width='80' height='65' fill='#2E5B9A'/>
  <text x='220' y='345' text-anchor='middle' font-size='14' fill='black'>0.0748</text>
  <text x='220' y='450' text-anchor='middle' font-size='14' fill='black'>线性回归</text>
  <rect x='350' y='120' width='80' height='300' fill='#D97825'/>
  <text x='390' y='110' text-anchor='middle' font-size='14' fill='black'>0.347</text>
  <text x='390' y='450' text-anchor='middle' font-size='14' fill='black'>多项式回归</text>
  <rect x='520' y='335' width='80' height='85' fill='#6A9C78'/>
  <text x='560' y='325' text-anchor='middle' font-size='14' fill='black'>0.098</text>
  <text x='560' y='450' text-anchor='middle' font-size='14' fill='black'>岭回归</text>
</svg>