<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300">
  <style>
    .title { font: bold 18px 'Microsoft YaHei', sans-serif; fill: #333; }
    .axis { font: 10px 'Microsoft YaHei', sans-serif; fill: #666; }
    .point { fill: #8B5A9E; stroke: #fff; }
  </style>
  <rect width="800" height="300" fill="#fff"/>
  <text x="400" y="30" text-anchor="middle" class="title">图F005: 浓度与各颜色通道散点图</text>
  <!-- Panel R -->
  <line x1="50" y1="250" x2="50" y2="60" stroke="black" stroke-width="1"/>
  <line x1="50" y1="250" x2="240" y2="250" stroke="black" stroke-width="1"/>
  <text x="145" y="280" text-anchor="middle" class="axis">R通道</text>
  <text x="20" y="155" text-anchor="middle" transform="rotate(-90,20,155)" class="axis">浓度</text>
  <!-- some points -->
  <circle cx="70" cy="240" r="4" class="point"/><circle cx="100" cy="210" r="4" class="point"/><circle cx="130" cy="180" r="4" class="point"/><circle cx="160" cy="150" r="4" class="point"/><circle cx="190" cy="120" r="4" class="point"/><circle cx="220" cy="90" r="4" class="point"/>
  <!-- Panel G -->
  <line x1="290" y1="250" x2="290" y2="60" stroke="black" stroke-width="1"/>
  <line x1="290" y1="250" x2="480" y2="250" stroke="black" stroke-width="1"/>
  <text x="385" y="280" text-anchor="middle" class="axis">G通道</text>
  <circle cx="310" cy="80" r="4" class="point"/><circle cx="340" cy="110" r="4" class="point"/><circle cx="370" cy="140" r="4" class="point"/><circle cx="400" cy="170" r="4" class="point"/><circle cx="430" cy="200" r="4" class="point"/><circle cx="460" cy="230" r="4" class="point"/>
  <!-- Panel B -->
  <line x1="530" y1="250" x2="530" y2="60" stroke="black" stroke-width="1"/>
  <line x1="530" y1="250" x2="720" y2="250" stroke="black" stroke-width="1"/>
  <text x="625" y="280" text-anchor="middle" class="axis">B通道</text>
  <circle cx="550" cy="90" r="4" class="point"/><circle cx="580" cy="120" r="4" class="point"/><circle cx="610" cy="150" r="4" class="point"/><circle cx="640" cy="180" r="4" class="point"/><circle cx="670" cy="210" r="4" class="point"/><circle cx="700" cy="240" r="4" class="point"/>
  <text x="20" y="295" class="axis">图F005: 所有通道均与浓度近似线性相关</text>
</svg>