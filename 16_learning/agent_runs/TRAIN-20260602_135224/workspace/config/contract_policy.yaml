version: v3.2-mvp

default_statuses:
  draft: draft
  ready: ready
  frozen: frozen
  blocked: blocked
  closed: closed
  waived: waived

required_contracts:
  before_prior_retrieval:
    - config/prior_db_policy.yaml
  before_figures:
    - 14_contracts/result_contract.csv
    - 14_contracts/figure_contract.csv
  before_paper_draft:
    - 14_contracts/claim_evidence_map.csv
    - 14_contracts/result_contract.csv
    - 14_contracts/figure_contract.csv
    - 14_contracts/formula_contract.csv
    - 14_contracts/citation_contract.csv
  before_auto_review:
    - 14_contracts/claim_evidence_map.csv
    - 14_contracts/result_contract.csv
    - 14_contracts/figure_contract.csv
    - 14_contracts/formula_contract.csv
    - 14_contracts/citation_contract.csv
  before_polish:
    - 14_contracts/artifact_freeze_registry.csv
  before_final:
    - 14_contracts/polish_diff_check.csv
    - 14_contracts/revision_tasks.csv

validation_failures:
  unsupported_claim: fail
  claim_without_result_or_citation: fail
  result_without_source_file: fail
  figure_without_result_source: fail
  figure_file_missing: fail
  latex_ref_to_unregistered_figure: fail
  formula_symbol_undefined: fail
  citation_without_support_grade: fail
  citation_metadata_unverified: fail
  polish_changed_number: fail
  polish_changed_formula: fail
  polish_changed_label_or_ref: fail
  revision_task_unresolved: fail
  prior_text_overlap_high: fail
  missing_stage_summary: warn
  missing_optional_ppt: ignore

thresholds:
  min_figure_quality_score: 4.2
  max_prior_text_overlap_ratio: 0.08
  max_polish_changed_protected_atoms: 0
  min_review_score: 85
