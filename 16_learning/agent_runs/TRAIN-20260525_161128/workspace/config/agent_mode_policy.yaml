{
  "version": "v1",
  "enabled": true,
  "default_mode": "training_sandbox",
  "agent_executor": {
    "command_template": [],
    "timeout_seconds": 1800,
    "fallback": "prompt_bundle"
  },
  "training_sandbox": {
    "max_iterations": 3,
    "copy_risk_required": true,
    "protected_formal_paths": [
      "workflow_state.yaml",
      "02_latex_template/",
      "05_model/",
      "06_code/",
      "07_results/",
      "08_figures/",
      "09_paper/",
      "12_submission/",
      "14_contracts/"
    ],
    "workspace_copy": {
      "directories": [
        "scripts",
        "config",
        "prompts",
        "00_problem",
        "01_task_analysis",
        "02_latex_template",
        "03_data",
        "04_eda",
        "04_eda_code",
        "05_model",
        "06_code",
        "06_solution_code",
        "07_results",
        "08_figures",
        "09_paper",
        "10_ai_logs",
        "11_review",
        "12_submission",
        "14_contracts",
        "15_iteration_memory"
      ],
      "files": [
        "AGENTS.md",
        "README.md",
        "requirements.txt",
        "workflow_state.yaml"
      ],
      "prior_db_partial": [
        "13_prior_db/cards",
        "13_prior_db/screening/pdf_manifest.csv",
        "13_prior_db/screening/retrieval_results.csv",
        "13_prior_db/fulltext_index/prior_card_tfidf.json",
        "13_prior_db/fulltext_index/source_meta.jsonl"
      ]
    }
  },
  "formal_assist": {
    "stop_on_pending_gate": true,
    "allow_confirm_gate": false,
    "allow_stage_all": false
  },
  "benchmark": {
    "source": "prior_db",
    "top_k_fulltext": 3,
    "ngram_size": 8,
    "max_prior_overlap_ratio": 0.08,
    "max_source_chars_per_doc": 120000
  },
  "reports": {
    "full_gap_report": "reports/full_gap_report.md",
    "gap_report": "reports/gap_report.csv",
    "revision_queue": "reports/agent_revision_queue.csv",
    "copy_risk_report": "reports/copy_risk_report.csv"
  }
}
