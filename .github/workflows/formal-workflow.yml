name: formal-workflow

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall mmwf scripts tests
      - run: python -m pytest -q
      - run: python scripts/validate_contracts.py --stage current
      - run: python scripts/check_gates.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: 11_dashboard/web/package-lock.json
      - run: npm ci
        working-directory: 11_dashboard/web
      - run: npm run build
        working-directory: 11_dashboard/web
